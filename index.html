<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PoolPics</title>
<meta name="description" content="Share photos from APA events">
<style>
  :root {
    --spm-primary: #ea002a;
    --spm-accent:  #0031a1;
    --bg:          #f3f3f3;
    --card:        #ffffff;
    --text:        #1a1a1a;
    --muted:       #6b7280;
    --border:      #e5e7eb;
    --success:     #16a34a;
    --warn:        #f59e0b;
    --radius:      14px;
    --pill:        999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  body { padding-bottom: 100px; min-height: 100vh; }

  /* ── Layout container (caps content at 1320px on big monitors so the
        feed doesn't stretch edge-to-edge and look sparse) ── */
  .container { max-width: 1320px; margin: 0 auto; padding: 0 16px; }
  @media (min-width: 1024px) { .container { padding: 0 32px; } }

  /* ── Header (red→blue gradient, persistent across event switches) ── */
  .header {
    background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
    color: #fff;
    padding: 14px 0 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 50;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header h1 {
    font-size: clamp(1.4rem, 1rem + 1.5vw, 2rem);
    font-weight: 900; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .header h1 .brand-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
  }
  .event-picker {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.45);
    color: #fff;
    border-radius: var(--pill);
    padding: 8px 32px 8px 16px;
    font-size: clamp(0.85rem, 0.7rem + 0.3vw, 1rem);
    font-weight: 700;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path fill="%23fff" d="M1 3l4 4 4-4z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 10px center;
    max-width: 60vw;
    text-overflow: ellipsis;
    transition: background 0.15s, border-color 0.15s;
  }
  .event-picker:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.7); }
  .event-picker option { color: #1a1a1a; }

  /* ── Event meta strip ── */
  .event-meta {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 18px 0;
  }
  .event-meta .ev-name {
    font-size: clamp(1.15rem, 0.95rem + 0.7vw, 1.6rem);
    font-weight: 800; color: var(--spm-accent);
    letter-spacing: -0.01em;
  }
  .event-meta .ev-dates {
    font-size: clamp(0.78rem, 0.7rem + 0.2vw, 0.92rem);
    color: var(--muted); margin-top: 4px; font-weight: 600;
  }
  .event-meta .ev-desc {
    font-size: clamp(0.88rem, 0.8rem + 0.2vw, 1rem);
    color: var(--text); margin-top: 8px; line-height: 1.55;
    max-width: 70ch;
  }
  .event-meta .ev-closed {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: var(--pill);
    background: rgba(245,158,11,0.15); color: #b45309;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* ── Feed (responsive: auto-fill column count by viewport width) ── */
  .feed {
    padding: 16px 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  @media (min-width: 600px)  { .feed { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding: 20px 0 28px; } }
  @media (min-width: 1024px) { .feed { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; padding: 24px 0 36px; } }
  @media (min-width: 1440px) { .feed { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; } }

  .post {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .post:active { transform: scale(0.97); }
  /* Hover lift only on devices that actually have a hover-capable pointer
     (desktop with mouse, not touch). Avoids sticky :hover state on tap. */
  @media (hover: hover) {
    .post:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.16); }
    .post:hover .post-img { transform: scale(1.04); }
  }
  .post-img-wrap { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background: #ddd; }
  .post-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .post .caption {
    padding: 10px 12px 12px;
    font-size: 0.86rem;
    line-height: 1.4;
    color: var(--text);
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .post .ts {
    padding: 0 12px 10px;
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: clamp(0.9rem, 0.85rem + 0.2vw, 1.05rem);
  }
  .empty .empty-emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; }

  /* ── Floating Add Photo button ── */
  .fab {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 40;
    background: var(--spm-accent);
    color: #fff;
    border: none;
    border-radius: var(--pill);
    padding: 14px 22px;
    font-size: 1rem; font-weight: 800;
    box-shadow: 0 6px 20px rgba(0,49,161,0.4);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .fab:hover { background: #0046cc; }
  .fab:disabled { opacity: 0.5; cursor: not-allowed; background: var(--muted); box-shadow: none; }
  .fab .plus { font-size: 1.3rem; line-height: 1; }
  @media (max-width: 480px) { .fab { padding: 12px 18px; font-size: 0.9rem; } }

  /* ── Modal base ── */
  .modal {
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.78);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal.shown { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: var(--radius);
    max-width: 500px; width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: none;
    font-size: 1.4rem; line-height: 1;
    cursor: pointer;
    z-index: 110;
  }

  /* ── Lightbox ── max-width grows on desktop so the photo fills the
        actual viewing area instead of being cramped in a tiny modal. */
  #lightbox .modal-box { max-width: min(92vw, 1100px); }
  .lightbox-img-wrap {
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .lightbox-img { width: 100%; max-height: 78vh; object-fit: contain; display: block; }
  .lightbox-caption {
    padding: 14px 4px 4px;
    font-size: clamp(0.9rem, 0.85rem + 0.2vw, 1.05rem);
    line-height: 1.5; color: #fff;
    max-width: 70ch;
  }
  .lightbox-ts {
    padding: 4px 4px 0;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.65);
    font-weight: 600;
  }

  /* ── Submission form ── */
  .form-section { margin-bottom: 14px; }
  .form-section label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .file-picker {
    display: block;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .file-picker.has-file { border-style: solid; border-color: var(--success); color: var(--text); padding: 0; overflow: hidden; }
  .file-picker img { display: block; width: 100%; max-height: 320px; object-fit: cover; }
  .file-picker .picker-icon { font-size: 2rem; display: block; margin-bottom: 6px; }
  .file-picker input[type="file"] { display: none; }
  .form-textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 0.95rem;
    resize: vertical;
    min-height: 80px;
  }
  .form-textarea:focus { outline: none; border-color: var(--spm-accent); }
  .char-count { font-size: 0.7rem; color: var(--muted); text-align: right; margin-top: 4px; }
  .char-count.over { color: var(--spm-primary); font-weight: 700; }
  .consent-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; cursor: pointer; }
  .consent-row input { width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; accent-color: var(--spm-accent); }
  .consent-row span { font-size: 0.85rem; line-height: 1.4; }
  .form-actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: var(--pill);
    font-size: 0.95rem; font-weight: 800;
    border: 0;
    cursor: pointer;
  }
  .btn-primary { background: var(--spm-accent); color: #fff; }
  .btn-primary:hover { background: #0046cc; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: #f5f5f5; }

  /* ── Banned overlay ── */
  .banned-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.92);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .banned-overlay.shown { display: flex; }
  .banned-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 24px;
    max-width: 420px; text-align: center;
  }
  .banned-box .ban-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .banned-box h3 { font-size: 1.2rem; font-weight: 800; color: var(--spm-primary); margin-bottom: 8px; }
  .banned-box p { color: #444; font-size: 0.9rem; line-height: 1.5; }

  /* ── Auto-update overlay ── */
  .update-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.72);
    z-index: 9999;
    display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  .update-overlay.shown { display: flex; }
  .update-box { background: #fff; border-radius: var(--radius); padding: 32px; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .update-spinner {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    border-radius: 50%;
    border: 5px solid rgba(0,49,161,0.15);
    border-top-color: var(--spm-accent);
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .update-title { font-size: 1.1rem; font-weight: 800; color: var(--spm-accent); margin-bottom: 6px; }
  .update-sub { color: #444; font-size: 0.85rem; line-height: 1.4; }

  /* ── Toast / banner ── */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--spm-accent); color: #fff;
    padding: 12px 20px;
    border-radius: var(--pill);
    font-size: 0.9rem; font-weight: 700;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    z-index: 90;
    display: none;
  }
  .toast.shown { display: block; animation: toastIn 0.25s ease-out; }
  .toast.err { background: var(--spm-primary); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ── Loading state ── */
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9rem; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Banned overlay (blocks everything if device is banned) -->
<div class="banned-overlay" id="bannedOverlay">
  <div class="banned-box">
    <div class="ban-icon">&#9888;&#65039;</div>
    <h3>Posting Disabled</h3>
    <p>One of your previous posts didn't meet our content guidelines, so posting and viewing have been paused on this device.</p>
  </div>
</div>

<!-- Auto-update overlay -->
<div class="update-overlay" id="updateOverlay">
  <div class="update-box">
    <div class="update-spinner"></div>
    <div class="update-title">Updating PoolPics</div>
    <div class="update-sub">A new version is being deployed. This page will reload automatically&hellip;</div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="container">
    <div class="header-row">
      <h1><span class="brand-dot"></span>PoolPics</h1>
      <select class="event-picker" id="eventPicker"></select>
    </div>
  </div>
</div>

<!-- Event meta strip -->
<div class="event-meta" id="eventMeta">
  <div class="container">
    <div class="ev-name" id="evName">Loading&hellip;</div>
  </div>
</div>

<!-- Feed -->
<div class="container">
  <div class="feed" id="feed">
    <div class="loading">Loading photos&hellip;</div>
  </div>
</div>

<!-- Floating "Add Photo" button -->
<button class="fab" id="addBtn" disabled>
  <span class="plus">+</span> Add Photo
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Submission modal -->
<div class="modal" id="postModal">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="closePostModal()">&times;</button>
    <div class="modal-title">Post a photo</div>
    <p style="color:var(--muted);font-size:0.82rem;margin-bottom:16px" id="postTargetLabel"></p>

    <div class="form-section">
      <label class="file-picker" id="filePicker">
        <input type="file" id="photoInput" accept="image/*" capture="environment">
        <div id="filePickerEmpty">
          <span class="picker-icon">&#128247;</span>
          Tap to choose a photo
        </div>
        <img id="filePreview" class="hidden" alt="preview">
      </label>
    </div>

    <div class="form-section">
      <label for="captionInput">Caption (optional)</label>
      <textarea class="form-textarea" id="captionInput" maxlength="500" placeholder="Add a caption&hellip;"></textarea>
      <div class="char-count" id="charCount">0 / 500</div>
    </div>

    <label class="consent-row">
      <input type="checkbox" id="consentBox">
      <span>I agree this photo can be displayed publicly and reposted by APA on social media or in event materials.</span>
    </label>

    <div class="form-actions">
      <button class="btn btn-outline" onclick="closePostModal()">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitPost()">Post</button>
    </div>
  </div>
</div>

<!-- Lightbox modal -->
<div class="modal" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="modal-box" style="position:relative;background:transparent;padding:0">
    <button class="modal-close" onclick="closeLightbox()">&times;</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightboxImg" alt="">
    </div>
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-ts" id="lightboxTs"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   APP IDENTITY (single source of truth — change here to rebrand)
   Internal identifiers (snapshot schema, snapshot Storage bucket,
   `snapshot.client_id` localStorage key, `snapshot` repo name) keep
   their original "snapshot" name to avoid pointless migrations — only
   user-visible branding changes when you rename the app.
   ════════════════════════════════════════════════════════════════════════ */
const APP_NAME    = 'PoolPics';
const APP_VERSION = '0.3';

/* ════════════════════════════════════════════════════════════════════════
   CONFIG — Supabase (consolidated spm-apa project, snapshot schema)
   ════════════════════════════════════════════════════════════════════════ */
const SB_URL  = 'https://dqzbekoaysgaiqljueac.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxemJla29heXNnYWlxbGp1ZWFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzA5NzgsImV4cCI6MjA5MDc0Njk3OH0.cCdGxZ4zEFzU_r6lWSDeoNWG67Q4MSYCAtpds035dfU';
const STORAGE_BUCKET = 'snapshot';
const SCHEMA = 'snapshot';

const SB_HEADERS_READ = {
  apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON,
  'Accept-Profile': SCHEMA
};
const SB_HEADERS_WRITE = {
  apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON,
  'Content-Type': 'application/json', 'Content-Profile': SCHEMA
};
const SB_HEADERS_APA = {
  apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON,
  'Accept-Profile': 'apa_core'
};

/* ════════════════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════════════════ */
let _events       = [];
let _currentEvent = null;
let _posts        = [];
let _device       = null;       // { client_id, canvas_fp, ip_address, user_agent, platform, ... }
let _isBanned     = false;
let _selectedFile = null;
let _versionMismatch = false;

/* ════════════════════════════════════════════════════════════════════════
   DEVICE FINGERPRINT
   client_id: persistent UUID in localStorage (device identity)
   canvas_fp: hash of a rendered canvas (cross-tab, harder to clear)
   ip_address: best-effort via ipify (free, no key)
   ════════════════════════════════════════════════════════════════════════ */
function _hash32(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
  return (h >>> 0).toString(36);
}
function _getOrCreateClientId() {
  let id = localStorage.getItem('snapshot.client_id');
  if (!id) {
    // crypto.randomUUID is widely supported on iOS 15.4+ / modern Android
    id = (crypto.randomUUID && crypto.randomUUID()) ||
      ('cid-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10));
    localStorage.setItem('snapshot.client_id', id);
  }
  return id;
}
function _computeCanvasFp() {
  try {
    const c = document.createElement('canvas');
    c.width = 240; c.height = 60;
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(0, 0, 240, 60);
    ctx.fillStyle = '#069';
    // Stable fingerprint string — independent of APP_NAME so a rebrand
    // doesn't invalidate every device's existing canvas_fp (and break any
    // bans keyed on it).
    ctx.fillText('apa-snapshot \u26a1 fp', 2, 4);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('the quick brown fox', 4, 24);
    return _hash32(c.toDataURL());
  } catch (_) { return ''; }
}
async function _fetchIp() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    if (!r.ok) return '';
    const data = await r.json();
    return data.ip || '';
  } catch (_) { return ''; }
}
async function buildDeviceFingerprint() {
  const ipPromise = _fetchIp();   // race the network with everything else
  const screen_size = window.screen.width + 'x' + window.screen.height;
  const ua = navigator.userAgent || '';
  const lang = navigator.language || '';
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || '';
  const platform = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || '';
  const ip = await ipPromise;
  return {
    client_id: _getOrCreateClientId(),
    canvas_fp: _computeCanvasFp(),
    ip_address: ip || null,
    user_agent: ua.substring(0, 500),
    platform, screen_size, language: lang, timezone: tz
  };
}

/* ════════════════════════════════════════════════════════════════════════
   AUTO-UPDATE (poll apa_core.apps every 30s; reload when newer version
   is on the GitHub Pages CDN). Same pattern as Slate.
   ════════════════════════════════════════════════════════════════════════ */
async function checkVersion() {
  if (_versionMismatch) return;
  try {
    const r = await fetch(SB_URL + '/rest/v1/apps?app_name=eq.' + APP_NAME + '&select=version', {
      headers: SB_HEADERS_APA
    });
    if (!r.ok) return;
    const d = await r.json();
    if (!d || !d.length) return;
    if (d[0].version && d[0].version !== APP_VERSION) {
      _versionMismatch = true;
      document.getElementById('updateOverlay').classList.add('shown');
      pollForDeploy(d[0].version);
    }
  } catch (_) { /* skip */ }
}
function pollForDeploy(target) {
  setTimeout(async () => {
    try {
      const r = await fetch('index.html?_=' + Date.now());
      if (r.ok) {
        const html = await r.text();
        if (html.indexOf("APP_VERSION = '" + target + "'") !== -1) {
          location.reload(true);
          return;
        }
      }
    } catch (_) {}
    pollForDeploy(target);
  }, 3000);
}

/* ════════════════════════════════════════════════════════════════════════
   BAN CHECK — query against the device's three identifiers; if any match
   in snapshot.bans, surface the blocking overlay.
   ════════════════════════════════════════════════════════════════════════ */
async function checkBanned() {
  if (!_device) return false;
  const ors = [];
  if (_device.client_id)  ors.push('and(identifier_type.eq.client_id,identifier_value.eq.' + encodeURIComponent(_device.client_id) + ')');
  if (_device.canvas_fp)  ors.push('and(identifier_type.eq.canvas_fp,identifier_value.eq.' + encodeURIComponent(_device.canvas_fp) + ')');
  if (_device.ip_address) ors.push('and(identifier_type.eq.ip,identifier_value.eq.' + encodeURIComponent(_device.ip_address) + ')');
  if (!ors.length) return false;
  try {
    const r = await fetch(SB_URL + '/rest/v1/bans?or=(' + ors.join(',') + ')&select=id&limit=1', {
      headers: SB_HEADERS_READ
    });
    if (!r.ok) return false;
    const data = await r.json();
    return data && data.length > 0;
  } catch (_) { return false; }
}

/* ════════════════════════════════════════════════════════════════════════
   PAGE LOAD LOGGING
   ════════════════════════════════════════════════════════════════════════ */
async function logPageLoad(eventId) {
  if (!_device) return;
  try {
    await fetch(SB_URL + '/rest/v1/page_loads', {
      method: 'POST',
      headers: { ...SB_HEADERS_WRITE, Prefer: 'return=minimal' },
      body: JSON.stringify({
        event_id: eventId || null,
        client_id: _device.client_id,
        canvas_fp: _device.canvas_fp,
        ip_address: _device.ip_address,
        user_agent: _device.user_agent,
        platform: _device.platform,
        screen_size: _device.screen_size,
        language: _device.language,
        timezone: _device.timezone
      })
    });
  } catch (_) {}
}

/* ════════════════════════════════════════════════════════════════════════
   EVENTS
   ════════════════════════════════════════════════════════════════════════ */
async function loadEvents() {
  const r = await fetch(SB_URL + '/rest/v1/events?select=*&order=start_date.desc', {
    headers: SB_HEADERS_READ
  });
  if (!r.ok) throw new Error('Failed to load events: ' + r.status);
  _events = await r.json();
}
function pickInitialEvent() {
  // Most recent open event whose date range covers today; else most recent
  // ever created.
  const today = new Date().toISOString().substring(0, 10);
  const liveOpen = _events.find(e =>
    e.posting_open && e.start_date <= today && e.end_date >= today);
  if (liveOpen) return liveOpen;
  // Then most recent open event regardless of dates
  const openAny = _events.find(e => e.posting_open);
  if (openAny) return openAny;
  // Then anything
  return _events[0] || null;
}
function renderEventPicker() {
  const sel = document.getElementById('eventPicker');
  if (!_events.length) {
    sel.innerHTML = '<option>No events yet</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  sel.innerHTML = _events.map(e =>
    '<option value="' + e.id + '"' + (e.id === (_currentEvent && _currentEvent.id) ? ' selected' : '') + '>'
    + esc(e.name) + '</option>').join('');
  sel.onchange = (ev) => {
    const id = parseInt(ev.target.value, 10);
    const next = _events.find(x => x.id === id);
    if (next) selectEvent(next);
  };
}
function renderEventMeta() {
  const wrap = document.getElementById('eventMeta');
  if (!_currentEvent) {
    wrap.innerHTML = '<div class="container"><div class="ev-name">No event selected</div></div>';
    return;
  }
  const e = _currentEvent;
  const dates = fmtDateRange(e.start_date, e.end_date);
  wrap.innerHTML =
    '<div class="container">'
    + '<div class="ev-name">' + esc(e.name) + '</div>'
    + '<div class="ev-dates">' + esc(dates) + (e.location ? ' \u00b7 ' + esc(e.location) : '') + '</div>'
    + (e.description ? '<div class="ev-desc">' + esc(e.description) + '</div>' : '')
    + (!e.posting_open ? '<span class="ev-closed">Posting Closed</span>' : '')
    + '</div>';
}
function fmtDateRange(s, e) {
  if (!s) return '';
  const [sy, sm, sd] = s.split('-').map(Number);
  const [ey, em, ed] = e.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const sStr = months[sm-1] + ' ' + sd;
  const eStr = (sm === em && sy === ey)
    ? sd + ' \u2013 ' + ed + ', ' + ey
    : months[em-1] + ' ' + ed + ', ' + ey;
  return (sm === em && sy === ey) ? months[sm-1] + ' ' + sd + ' \u2013 ' + ed + ', ' + ey : sStr + ' \u2013 ' + eStr + ', ' + ey;
}

/* ════════════════════════════════════════════════════════════════════════
   POSTS / FEED
   ════════════════════════════════════════════════════════════════════════ */
async function selectEvent(e) {
  _currentEvent = e;
  renderEventMeta();
  renderEventPicker();   // re-render to update selected state
  // Toggle Add button based on posting_open
  const addBtn = document.getElementById('addBtn');
  addBtn.disabled = !e.posting_open || _isBanned;
  await logPageLoad(e.id);
  await loadFeed();
}
async function loadFeed() {
  if (!_currentEvent) return;
  const feedEl = document.getElementById('feed');
  feedEl.innerHTML = '<div class="loading">Loading photos&hellip;</div>';
  try {
    const r = await fetch(SB_URL + '/rest/v1/posts?event_id=eq.' + _currentEvent.id
      + '&hidden=eq.false&select=id,photo_path,caption,posted_at&order=posted_at.desc&limit=300', {
      headers: SB_HEADERS_READ
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _posts = await r.json();
    renderFeed();
  } catch (e) {
    feedEl.innerHTML = '<div class="empty">Failed to load: ' + esc(e.message) + '</div>';
  }
}
function renderFeed() {
  const feedEl = document.getElementById('feed');
  if (!_posts.length) {
    feedEl.innerHTML = '<div class="empty"><span class="empty-emoji">&#128247;</span>'
      + (_currentEvent && _currentEvent.posting_open
          ? 'Be the first to post!'
          : 'No posts yet.')
      + '</div>';
    return;
  }
  feedEl.innerHTML = _posts.map((p, i) =>
    '<div class="post" onclick="openLightbox(' + i + ')">'
    + '<div class="post-img-wrap"><img class="post-img" loading="lazy" src="' + esc(photoUrl(p.photo_path)) + '" alt=""></div>'
    + (p.caption ? '<div class="caption">' + esc(p.caption) + '</div>' : '')
    + '<div class="ts">' + esc(fmtRelative(p.posted_at)) + '</div>'
    + '</div>'
  ).join('');
}
function photoUrl(path) {
  return SB_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + path;
}
function fmtRelative(ts) {
  if (!ts) return '';
  const ms = Date.now() - new Date(ts).getTime();
  const m = Math.round(ms / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.round(h / 24);
  return d + 'd ago';
}
function openLightbox(i) {
  const p = _posts[i];
  if (!p) return;
  document.getElementById('lightboxImg').src = photoUrl(p.photo_path);
  document.getElementById('lightboxCaption').textContent = p.caption || '';
  document.getElementById('lightboxTs').textContent = fmtRelative(p.posted_at);
  document.getElementById('lightbox').classList.add('shown');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('shown');
}

/* ════════════════════════════════════════════════════════════════════════
   POSTING
   - HEIC → JPEG via heic2any (lazy-loaded from CDN if user picks .heic)
   - Resize to 1920px max via canvas
   - Direct upload to Supabase Storage
   - Insert row into snapshot.posts
   ════════════════════════════════════════════════════════════════════════ */
function openPostModal() {
  if (!_currentEvent) return;
  if (!_currentEvent.posting_open) {
    showToast('Posting is closed for this event', 'err');
    return;
  }
  if (_isBanned) return;
  document.getElementById('postTargetLabel').textContent = 'Posting to: ' + _currentEvent.name;
  _selectedFile = null;
  document.getElementById('photoInput').value = '';
  document.getElementById('captionInput').value = '';
  document.getElementById('consentBox').checked = false;
  document.getElementById('filePreview').classList.add('hidden');
  document.getElementById('filePreview').src = '';
  document.getElementById('filePickerEmpty').classList.remove('hidden');
  document.getElementById('filePicker').classList.remove('has-file');
  document.getElementById('charCount').textContent = '0 / 500';
  document.getElementById('charCount').classList.remove('over');
  document.getElementById('postModal').classList.add('shown');
}
function closePostModal() {
  document.getElementById('postModal').classList.remove('shown');
}

document.getElementById('addBtn').addEventListener('click', openPostModal);

document.getElementById('photoInput').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  const isHeic = /\.(heic|heif)$/i.test(f.name) || /heic|heif/.test(f.type);
  let blob = f;
  if (isHeic) {
    showToast('Converting iPhone photo\u2026');
    try {
      blob = await heicToJpeg(f);
    } catch (e) {
      showToast('Could not convert HEIC: ' + e.message, 'err');
      return;
    }
  }
  // Show preview
  const url = URL.createObjectURL(blob);
  const img = document.getElementById('filePreview');
  img.src = url;
  img.classList.remove('hidden');
  document.getElementById('filePickerEmpty').classList.add('hidden');
  document.getElementById('filePicker').classList.add('has-file');
  _selectedFile = blob;
});

document.getElementById('captionInput').addEventListener('input', (ev) => {
  const len = ev.target.value.length;
  const cc = document.getElementById('charCount');
  cc.textContent = len + ' / 500';
  cc.classList.toggle('over', len > 500);
});

let _heic2anyPromise = null;
function loadHeic2any() {
  if (_heic2anyPromise) return _heic2anyPromise;
  _heic2anyPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
    s.onload = () => resolve(window.heic2any);
    s.onerror = () => reject(new Error('Failed to load heic2any from CDN'));
    document.head.appendChild(s);
  });
  return _heic2anyPromise;
}
async function heicToJpeg(file) {
  const heic2any = await loadHeic2any();
  return await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
}

// Resize an image blob to a max dimension. Preserves aspect ratio + EXIF
// orientation (the browser auto-applies orientation when drawing to canvas
// from a freshly-loaded image element on iOS 13.4+ and modern Chrome).
async function resizeImage(blob, maxDim) {
  const img = await loadImageFromBlob(blob);
  const w = img.naturalWidth, h = img.naturalHeight;
  let nw = w, nh = h;
  if (w > h && w > maxDim) { nw = maxDim; nh = Math.round(h * (maxDim / w)); }
  else if (h > maxDim) { nh = maxDim; nw = Math.round(w * (maxDim / h)); }
  if (nw === w && nh === h) return blob;   // already small enough
  const canvas = document.createElement('canvas');
  canvas.width = nw; canvas.height = nh;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, nw, nh);
  return new Promise((resolve, reject) => {
    canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob returned null')),
      'image/jpeg', 0.88);
  });
}
function loadImageFromBlob(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not decode image')); };
    img.src = url;
  });
}

async function submitPost() {
  if (!_selectedFile) { showToast('Pick a photo first', 'err'); return; }
  if (!document.getElementById('consentBox').checked) {
    showToast('Please check the consent box to post', 'err'); return;
  }
  const caption = document.getElementById('captionInput').value.trim().substring(0, 500);
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true; submitBtn.textContent = 'Uploading\u2026';
  try {
    // Re-check ban right at submit time (in case admin banned between
    // page load and now).
    if (await checkBanned()) {
      _isBanned = true;
      closePostModal();
      document.getElementById('bannedOverlay').classList.add('shown');
      return;
    }
    // Resize for upload — keep mobile uploads snappy and storage cheap.
    const resized = await resizeImage(_selectedFile, 1920);
    // Generate path: <event-slug>/<unix-ts>-<rand>.jpg
    const ts = Date.now();
    const rand = Math.random().toString(36).slice(2, 10);
    const path = _currentEvent.slug + '/' + ts + '-' + rand + '.jpg';

    // Upload to Supabase Storage
    const upRes = await fetch(SB_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + encodeURIComponent(path), {
      method: 'POST',
      headers: {
        apikey: SB_ANON,
        Authorization: 'Bearer ' + SB_ANON,
        'Content-Type': 'image/jpeg',
        'Cache-Control': 'public, max-age=31536000'
      },
      body: resized
    });
    if (!upRes.ok) {
      const err = await upRes.text();
      throw new Error('Upload failed: ' + err.substring(0, 200));
    }

    // Insert row in snapshot.posts
    const postRes = await fetch(SB_URL + '/rest/v1/posts', {
      method: 'POST',
      headers: { ...SB_HEADERS_WRITE, Prefer: 'return=representation' },
      body: JSON.stringify({
        event_id: _currentEvent.id,
        photo_path: path,
        caption: caption || null,
        client_id: _device.client_id,
        canvas_fp: _device.canvas_fp,
        ip_address: _device.ip_address,
        user_agent: _device.user_agent,
        platform: _device.platform,
        screen_size: _device.screen_size,
        language: _device.language,
        timezone: _device.timezone
      })
    });
    if (!postRes.ok) {
      const err = await postRes.text();
      throw new Error('Save failed: ' + err.substring(0, 200));
    }
    closePostModal();
    showToast('Posted!');
    await loadFeed();
  } catch (e) {
    showToast(e.message, 'err');
  } finally {
    submitBtn.disabled = false; submitBtn.textContent = 'Post';
  }
}

/* ════════════════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
let _toastTimer = null;
function showToast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('err');
  if (kind === 'err') t.classList.add('err');
  t.classList.add('shown');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('shown'), 3500);
}

/* ════════════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════════════ */
async function init() {
  document.title = APP_NAME;
  // Kick off auto-update first so even a banned device gets the new build.
  checkVersion();
  setInterval(checkVersion, 30000);

  try {
    _device = await buildDeviceFingerprint();
    _isBanned = await checkBanned();
    if (_isBanned) {
      document.getElementById('bannedOverlay').classList.add('shown');
      // Don't load anything else — banned users see only the overlay.
      return;
    }
    await loadEvents();
    if (!_events.length) {
      document.getElementById('feed').innerHTML =
        '<div class="empty"><span class="empty-emoji">&#128235;</span>No events yet. Check back soon.</div>';
      document.getElementById('eventMeta').innerHTML = '<div class="ev-name">Snapshot</div>';
      return;
    }
    const initial = pickInitialEvent();
    await selectEvent(initial);
  } catch (e) {
    document.getElementById('feed').innerHTML =
      '<div class="empty">Could not start: ' + esc(e.message) + '</div>';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
